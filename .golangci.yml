version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - revive
    - errorlint
    - copyloopvar
  settings:
    gocritic:
      enabled-checks:
        - dupImport
        - nestingReduce
        - regexpSimplify
        - truncateCmp
        - unnamedResult
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: receiver-naming
        - name: var-naming
        - name: exported
          disabled: true
        - name: unused-parameter
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

output:
  formats:
    colored-line-number: {}
  sort-results: true
  sort-order:
    - file
